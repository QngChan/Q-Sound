<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q-Sound - Premium Audio Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-color: #050505;
            --panel-bg: rgba(20, 20, 20, 0.7);
            --accent-blue: #007AFF;
            --accent-cyan: #5AC8FA;
            --accent-fav: #FFD700;
            --text-primary: #FFFFFF;
            --text-secondary: #AAAAAA;
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
            background: radial-gradient(circle at top right, #1a1a2e, #050505);
        }

        .app-container {
            display: flex;
            height: 100%;
            backdrop-filter: blur(5px);
        }

        /* Sidebar */
        .sidebar {
            width: 280px;
            background: var(--panel-bg);
            border-right: 1px solid var(--glass-border);
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            backdrop-filter: blur(20px);
            z-index: 10;
        }

        .logo {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 40px;
            display: flex;
            align-items: center;
            gap: 10px;
            background: linear-gradient(to right, #fff, var(--accent-cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .sidebar-section {
            margin-bottom: 30px;
        }

        .sidebar-title {
            font-size: 11px;
            font-weight: 700;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .device-select {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            color: white;
            padding: 10px;
            border-radius: 12px;
            margin-bottom: 10px;
            font-size: 13px;
            outline: none;
            transition: all 0.3s;
        }

        .device-select:focus {
            border-color: var(--accent-blue);
            background: rgba(255, 255, 255, 0.1);
        }

        .control-item {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
            font-size: 14px;
        }

        .slider-container {
            margin-top: 20px;
        }

        input[type="range"] {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            -webkit-appearance: none;
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 15px;
            height: 15px;
            background: var(--accent-blue);
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 10px var(--accent-blue);
        }

        /* Main Content */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 30px;
            overflow: hidden;
            position: relative;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .search-container {
            position: relative;
            flex: 1;
            max-width: 600px;
        }

        .search-input {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            padding: 14px 20px 14px 50px;
            border-radius: 18px;
            color: white;
            font-size: 15px;
            outline: none;
            transition: all 0.3s;
        }

        .search-input:focus {
            border-color: var(--accent-blue);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 20px rgba(0, 122, 255, 0.2);
        }

        .search-icon {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
        }

        .loading-progress {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(to right, transparent, var(--accent-blue), transparent);
            background-size: 200% 100%;
            animation: loading-shimmer 1.5s infinite linear;
            display: none;
        }

        @keyframes loading-shimmer {
            0% {
                background-position: 200% 0;
            }

            100% {
                background-position: -200% 0;
            }
        }

        .sounds-grid-container {
            flex: 1;
            overflow-y: auto;
            padding-right: 10px;
        }

        .sounds-grid-container::-webkit-scrollbar {
            width: 6px;
        }

        .sounds-grid-container::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
        }

        .section-header {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 20px;
            color: var(--text-secondary);
        }

        .sounds-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
            gap: 20px;
        }

        .sound-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            transition: all 0.3s;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .sound-card:hover {
            background: rgba(255, 255, 255, 0.07);
            transform: translateY(-5px);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .sound-btn {
            width: 65px;
            height: 65px;
            border-radius: 50%;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
            transition: all 0.3s;
            position: relative;
        }

        .sound-card:hover .sound-btn {
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.5);
            transform: scale(1.05);
        }

        .sound-name {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .sound-card:hover .sound-name {
            color: white;
        }

        .fav-star {
            position: absolute;
            top: 10px;
            right: 10px;
            color: rgba(255, 255, 255, 0.2);
            transition: all 0.3s;
        }

        .fav-star.active {
            color: var(--accent-fav);
        }

        /* Playback Panel */
        .playback-panel {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(150%);
            width: 90%;
            max-width: 700px;
            background: rgba(25, 25, 25, 0.8);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 24px;
            padding: 15px 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
        }

        .playback-panel.visible {
            transform: translateX(-50%) translateY(0);
        }

        .playing-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .playing-text {
            font-size: 14px;
            font-weight: 600;
        }

        .stop-btn {
            background: #E02020;
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
        }

        .stop-btn:hover {
            background: #FF3B30;
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(224, 32, 32, 0.4);
        }

        /* Toggles */
        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 44px;
            height: 24px;
        }

        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(255, 255, 255, 0.1);
            transition: .4s;
            border-radius: 24px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked+.slider {
            background-color: var(--accent-blue);
        }

        input:checked+.slider:before {
            transform: translateX(20px);
        }
    </style>
</head>

<body>
    <div class="loading-progress" id="loading-bar"></div>

    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo">
                <img src="/assets/logo.png" style="width: 32px; height: 32px; border-radius: 8px;">
                <span>Q-Sound</span>
            </div>

            <div class="sidebar-section">
                <div class="sidebar-title"><i data-lucide="speaker"></i> Output Devices</div>
                <label style="font-size: 11px; color: var(--text-secondary);">Speaker / Ear</label>
                <select class="device-select" id="physical-out"></select>

                <label style="font-size: 11px; color: var(--text-secondary);">Virtual Cable (To Others)</label>
                <select class="device-select" id="virtual-out"></select>
            </div>

            <div class="sidebar-section">
                <div class="sidebar-title"><i data-lucide="mic"></i> Microphone Hub</div>
                <select class="device-select" id="mic-in"></select>

                <div class="control-item">
                    <label class="toggle-switch">
                        <input type="checkbox" id="mic-toggle">
                        <span class="slider"></span>
                    </label>
                    <span>Route Mic to Virtual</span>
                </div>
                <div id="echo-warning"
                    style="font-size: 10px; color: #FF3B30; margin-top: 5px; display: none; background: rgba(255,59,48,0.1); padding: 8px; border-radius: 8px;">
                    ⚠️ Speaker and Virtual Cable are the same! You will hear an echo.
                </div>
            </div>

            <div class="sidebar-section">
                <div class="sidebar-title"><i data-lucide="volume-2"></i> Global Volume</div>
                <div class="slider-container">
                    <input type="range" min="0" max="100" value="100" id="volume-slider">
                    <div style="text-align: right; font-size: 12px; margin-top: 5px;" id="vol-percent">100%</div>
                </div>
            </div>

            <div style="margin-top: auto;">
                <button class="device-select" id="refresh-btn"
                    style="cursor: pointer; background: rgba(255,255,255,0.1);">
                    <i data-lucide="refresh-cw" style="width: 14px; height: 14px; margin-right: 5px;"></i> Refresh
                    Devices
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <div class="top-bar">
                <div class="search-container">
                    <i data-lucide="search" class="search-icon"></i>
                    <input type="text" class="search-input" id="search-input"
                        placeholder="Discover unlimited sounds...">
                </div>
            </div>

            <div class="section-header" id="grid-title">Turkish Trending</div>

            <div class="sounds-grid-container" id="scroll-container">
                <div class="sounds-grid" id="sounds-grid">
                    <!-- Sounds will be injected here -->
                </div>
            </div>

            <!-- Playback Panel -->
            <div class="playback-panel" id="playback-panel">
                <div class="playing-info">
                    <div class="sound-btn" id="panel-btn" style="width: 40px; height: 40px; margin-bottom: 0;">
                        <i data-lucide="play" style="width: 18px; color: white;"></i>
                    </div>
                    <div class="playing-text" id="playing-name">Sound Name</div>
                </div>
                <button class="stop-btn" id="stop-btn">STOP</button>
            </div>
        </main>
    </div>

    <script>
        const API_BASE = "http://127.0.0.1:8000";
        let favorites = [];
        let currentlyPlaying = null;
        let isLoading = false;
        let currentPage = 1;

        // Colors for buttons
        const colors = ["#FF3B30", "#FF9500", "#FFCC00", "#4CD964", "#5AC8FA", "#007AFF", "#5856D6", "#FF2D55"];

        async function init() {
            lucide.createIcons();
            await loadDevices();
            await loadFavorites();
            await loadSounds();

            // Listeners
            document.getElementById('search-input').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') search();
            });
            document.getElementById('refresh-btn').onclick = loadDevices;
            document.getElementById('stop-btn').onclick = stopSound;
            document.getElementById('volume-slider').oninput = e => {
                const vol = e.target.value / 100;
                document.getElementById('vol-percent').innerText = e.target.value + "%";
                fetch(`${API_BASE}/volume`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ level: vol })
                });
            };
            document.getElementById('mic-toggle').onchange = e => {
                const pId = document.getElementById('physical-out').value;
                const vId = document.getElementById('virtual-out').value;

                if (pId === vId && e.target.checked) {
                    document.getElementById('echo-warning').style.display = 'block';
                } else {
                    document.getElementById('echo-warning').style.display = 'none';
                }

                const enabled = e.target.checked;
                const mId = document.getElementById('mic-in').value;
                fetch(`${API_BASE}/mic/toggle?input_id=${mId}&output_id=${vId}&enable=${enabled}`, { method: 'POST' });
            };

            const checkEcho = () => {
                const pId = document.getElementById('physical-out').value;
                const vId = document.getElementById('virtual-out').value;
                const warning = document.getElementById('echo-warning');
                if (pId === vId && document.getElementById('mic-toggle').checked) {
                    warning.style.display = 'block';
                } else {
                    warning.style.display = 'none';
                }
            };
            document.getElementById('physical-out').onchange = checkEcho;
            document.getElementById('virtual-out').onchange = checkEcho;
            document.getElementById('scroll-container').onscroll = e => {
                const { scrollTop, scrollHeight, clientHeight } = e.target;
                if (scrollTop + clientHeight > scrollHeight - 100) {
                    if (!isLoading) loadSounds();
                }
            };
        }

        async function loadDevices() {
            const res = await fetch(`${API_BASE}/devices`);
            const data = await res.json();
            const fill = (el, list) => {
                el.innerHTML = "";
                list.forEach(d => {
                    const opt = document.createElement('option');
                    opt.value = d.id;
                    opt.innerText = d.name;
                    el.appendChild(opt);
                });
            };
            fill(document.getElementById('physical-out'), data.output);
            fill(document.getElementById('virtual-out'), data.output);
            fill(document.getElementById('mic-in'), data.input);
        }

        async function loadFavorites() {
            const res = await fetch(`${API_BASE}/favorites`);
            favorites = await res.json();
        }

        async function loadSounds() {
            isLoading = true;
            document.getElementById('loading-bar').style.display = 'block';
            const res = await fetch(`${API_BASE}/sounds?page=${currentPage}`);
            const sounds = await res.json();
            if (sounds.length > 0) {
                appendSounds(sounds);
                currentPage++;
            }
            isLoading = false;
            document.getElementById('loading-bar').style.display = 'none';
        }

        async function search() {
            const query = document.getElementById('search-input').value;
            if (!query) {
                currentPage = 1;
                document.getElementById('sounds-grid').innerHTML = "";
                document.getElementById('grid-title').innerText = "Turkish Trending";
                loadSounds();
                return;
            }
            document.getElementById('sounds-grid').innerHTML = "";
            document.getElementById('grid-title').innerText = `Results for "${query}"`;
            document.getElementById('loading-bar').style.display = 'block';
            const res = await fetch(`${API_BASE}/search?q=${query}`);
            const sounds = await res.json();
            appendSounds(sounds);
            document.getElementById('loading-bar').style.display = 'none';
        }

        function appendSounds(sounds) {
            const grid = document.getElementById('sounds-grid');
            sounds.forEach(sound => {
                const isFav = favorites.some(f => f.url === sound.url);
                const color = colors[Math.floor(Math.random() * colors.length)];

                const card = document.createElement('div');
                card.className = "sound-card";
                card.innerHTML = `
                    <div class="fav-star ${isFav ? 'active' : ''}" onclick="toggleFav(event, '${sound.name}', '${sound.url}')">
                        <i data-lucide="star" style="width: 14px; height: 14px; fill: ${isFav ? 'currentColor' : 'none'}"></i>
                    </div>
                    <div class="sound-btn" style="background: ${color}">
                        <i data-lucide="play" style="width: 24px; color: white;"></i>
                    </div>
                    <div class="sound-name">${sound.name}</div>
                `;
                card.onclick = () => playSound(sound);
                grid.appendChild(card);
            });
            lucide.createIcons();
        }

        async function toggleFav(e, name, url) {
            e.stopPropagation();
            const star = e.currentTarget;
            const res = await fetch(`${API_BASE}/favorites/toggle`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, url })
            });
            favorites = await res.json();
            star.classList.toggle('active');
            const icon = star.querySelector('svg');
            icon.style.fill = star.classList.contains('active') ? '#FFD700' : 'none';
        }

        async function playSound(sound) {
            const pId = document.getElementById('physical-out').value;
            const vId = document.getElementById('virtual-out').value;
            const device_ids = [parseInt(pId), parseInt(vId)];

            showPlayback(sound.name);
            fetch(`${API_BASE}/play`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ url: sound.url, device_ids })
            });
        }

        async function stopSound() {
            await fetch(`${API_BASE}/stop`, { method: 'POST' });
            hidePlayback();
        }

        function showPlayback(name) {
            const panel = document.getElementById('playback-panel');
            document.getElementById('playing-name').innerText = name;
            panel.classList.add('visible');
        }

        function hidePlayback() {
            document.getElementById('playback-panel').classList.remove('visible');
        }

        init();
    </script>
</body>

</html>
